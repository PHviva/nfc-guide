name: Auto-deploy NFC Guide

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Update NFC data (weekly/manual only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python update_nfc_data.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated data if changed
        run: |
          git config user.email "bot@github.com"
          git config user.name "NFC Guide Bot"
          git add data.js || true
          git diff --cached --quiet || git commit -m "chore: update NFC data $(date +%Y-%m-%d)"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
